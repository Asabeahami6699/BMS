services:
  - type: web
    name: bms-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build:backend
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: BOOTSTRAP_DEMO_ADMIN
        value: "false"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false
